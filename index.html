<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <!-- ═══════════════════════════════════════
       HEADER — Greeting + Clock + Controls
  ════════════════════════════════════════ -->
  <header class="header">
    <div class="header-left">
      <p class="greeting" id="greeting">Good morning!</p>
      <h1 class="clock" id="clock">00:00:00</h1>
      <p class="date" id="date">Wednesday, 15 July 2026</p>
    </div>
    <div class="header-right">
      <!-- Custom name -->
      <div class="name-wrap" id="nameWrap">
        <span class="name-display" id="nameDisplay">Set your name</span>
        <button class="icon-btn" id="editNameBtn" title="Edit name" aria-label="Edit name">✏️</button>
      </div>
      <div class="name-edit hidden" id="nameEdit">
        <input type="text" id="nameInput" placeholder="Your name…" maxlength="32" />
        <button class="btn btn-sm" id="saveNameBtn">Save</button>
      </div>
      <!-- Dark mode toggle -->
      <button class="toggle-theme" id="themeToggle" aria-label="Toggle dark mode">
        <span id="themeIcon">🌙</span>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════
       MAIN GRID
  ════════════════════════════════════════ -->
  <main class="grid">

    <!-- ── Focus Timer ──────────────────── -->
    <section class="card timer-card" aria-label="Focus Timer">
      <h2 class="card-title">Focus Timer</h2>
      <div class="timer-display" id="timerDisplay">25:00</div>
      <div class="timer-controls">
        <button class="btn btn-primary" id="timerStart">Start</button>
        <button class="btn btn-secondary" id="timerStop">Stop</button>
        <button class="btn btn-ghost" id="timerReset">Reset</button>
      </div>
      <p class="timer-label" id="timerLabel">Pomodoro — 25 min</p>
    </section>

    <!-- ── To-Do List ────────────────────── -->
    <section class="card todo-card" aria-label="To-Do List">
      <div class="card-header-row">
        <h2 class="card-title">To-Do List</h2>
        <div class="sort-wrap">
          <label for="sortSelect" class="sr-only">Sort tasks</label>
          <select id="sortSelect" class="sort-select" title="Sort tasks">
            <option value="default">Default</option>
            <option value="az">A → Z</option>
            <option value="za">Z → A</option>
            <option value="done">Done last</option>
            <option value="undone">Done first</option>
          </select>
        </div>
      </div>

      <div class="todo-input-row">
        <input
          type="text"
          id="taskInput"
          placeholder="Add a new task…"
          maxlength="120"
          aria-label="New task"
        />
        <button class="btn btn-primary" id="addTaskBtn">Add</button>
      </div>

      <ul class="task-list" id="taskList" aria-label="Task list"></ul>
      <p class="empty-hint" id="emptyHint">No tasks yet. Add one above!</p>
    </section>

    <!-- ── Quick Links ───────────────────── -->
    <section class="card links-card" aria-label="Quick Links">
      <h2 class="card-title">Quick Links</h2>

      <div class="link-input-row">
        <input type="text" id="linkLabel" placeholder="Label" maxlength="32" aria-label="Link label" />
        <input type="url"  id="linkUrl"   placeholder="https://…" aria-label="Link URL" />
        <button class="btn btn-primary" id="addLinkBtn">Add</button>
      </div>

      <div class="links-grid" id="linksGrid"></div>
      <p class="empty-hint" id="emptyLinksHint">No links yet. Add your favorites!</p>
    </section>

  </main>

  <script src="js/app.js"></script>
</body>
</html>
