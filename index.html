<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Life Dashboard</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="light">

  <!-- ========== THEME TOGGLE ========== -->
  <button id="theme-toggle" aria-label="Toggle light/dark theme" title="Toggle theme">
    <span id="theme-icon">🌙</span>
  </button>

  <div class="dashboard">

    <!-- ========== GREETING WIDGET ========== -->
    <section class="widget widget--greeting" id="greeting">
      <div class="greeting__time" id="greeting-time">00:00:00</div>
      <div class="greeting__date" id="greeting-date">Loading…</div>
      <div class="greeting__message" id="greeting-message">Hello!</div>
      <div class="greeting__name-row">
        <span class="greeting__name-label">Your name:</span>
        <input
          type="text"
          id="name-input"
          class="greeting__name-input"
          maxlength="40"
          placeholder="Enter your name"
          aria-label="Your display name"
        />
        <button id="name-save" class="btn btn--small" aria-label="Save name">Save</button>
      </div>
    </section>

    <!-- ========== POMODORO TIMER ========== -->
    <section class="widget widget--timer" id="timer">
      <h2 class="widget__title">Focus Timer</h2>
      <div class="timer__display" id="timer-display" aria-live="polite">25:00</div>
      <div class="timer__config">
        <label for="timer-duration" class="timer__label">Duration (min):</label>
        <input
          type="number"
          id="timer-duration"
          class="timer__input"
          min="1"
          max="99"
          value="25"
          aria-label="Timer duration in minutes"
        />
      </div>
      <div class="timer__controls">
        <button id="timer-start" class="btn btn--primary" aria-label="Start timer">Start</button>
        <button id="timer-stop" class="btn" aria-label="Stop timer" disabled>Stop</button>
        <button id="timer-reset" class="btn" aria-label="Reset timer">Reset</button>
      </div>
    </section>

    <!-- ========== TO-DO LIST ========== -->
    <section class="widget widget--todo" id="todo">
      <h2 class="widget__title">To-Do List</h2>

      <form id="todo-form" class="todo__form" novalidate>
        <input
          type="text"
          id="todo-input"
          class="todo__input"
          placeholder="Add a new task…"
          maxlength="200"
          aria-label="New task description"
          autocomplete="off"
        />
        <button type="submit" class="btn btn--primary" aria-label="Add task">Add</button>
      </form>
      <div id="todo-error" class="error-msg" role="alert" aria-live="polite"></div>

      <div class="todo__controls">
        <label for="sort-select" class="todo__sort-label">Sort:</label>
        <select id="sort-select" class="todo__sort" aria-label="Sort tasks">
          <option value="none">Default</option>
          <option value="status">By Status</option>
          <option value="alpha">Alphabetical</option>
        </select>
      </div>

      <ul id="todo-list" class="todo__list" aria-label="Task list"></ul>
    </section>

    <!-- ========== QUICK LINKS ========== -->
    <section class="widget widget--links" id="quicklinks">
      <h2 class="widget__title">Quick Links</h2>

      <form id="links-form" class="links__form" novalidate>
        <input
          type="text"
          id="link-label"
          class="links__input"
          placeholder="Label"
          maxlength="40"
          aria-label="Link label"
          autocomplete="off"
        />
        <input
          type="url"
          id="link-url"
          class="links__input"
          placeholder="https://example.com"
          aria-label="Link URL"
          autocomplete="off"
        />
        <button type="submit" class="btn btn--primary" aria-label="Add link">Add</button>
      </form>
      <div id="links-error" class="error-msg" role="alert" aria-live="polite"></div>

      <div id="links-container" class="links__container" aria-label="Quick links"></div>
    </section>

  </div><!-- /dashboard -->

  <!-- LocalStorage unavailability warning (hidden by default) -->
  <div id="ls-warning" class="ls-warning" role="alert" style="display:none;">
    ⚠️ Local Storage is unavailable. Data will not be saved between sessions.
  </div>

  <script src="js/app.js"></script>
</body>
</html>
